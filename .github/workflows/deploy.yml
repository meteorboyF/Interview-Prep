name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages and use OIDC for the deploy step.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Enables GitHub Pages automatically if it isn't already (needs pages: write).
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # `build` runs: ingest notes -> astro build (base=/Interview-Prep) -> pagefind index
      - name: Build site
        run: npm run build

      # HR SQL Trainer (sql-trainer/): builds the browser SQLite DB from the
      # canonical CSVs, runs all lesson-example tests, then the Vite build.
      - name: Install SQL Trainer dependencies
        run: npm ci
        working-directory: sql-trainer

      - name: Build SQL Trainer
        run: npm run build
        working-directory: sql-trainer
        env:
          BASE_PATH: /Interview-Prep/sql-trainer/

      - name: Merge SQL Trainer into site output
        run: cp -r sql-trainer/dist dist/sql-trainer

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
